{% extends 'base.html' %}

{% block content %}

<div class="d-flex justify-content-center align-items-center" style="min-height: 80vh;">
    <div class="card bg-dark border-secondary" style="width: 100%; max-width: 420px;">
        <div class="card-body p-4">

            <!-- LOGO -->
            <div class="text-center mb-4">
                <img src="{{ url_for('static', filename='images/logo.png') }}"
                     alt="MarketSync Logo" style="height: 64px; width: auto;">
                <h3 class="fw-bold text-white mt-3 mb-1">Welcome Back</h3>
                <p class="text-muted small">Sign in to your MarketSync account</p>
            </div>

            <!-- FORM -->
            <form action="{{ url_for('login') }}" method="POST">
                <div class="mb-3">
                    <label class="form-label text-muted small text-uppercase">Email Address</label>
                    <input type="email" name="email"
                           class="form-control bg-dark text-white border-secondary"
                           placeholder="you@example.com" required autofocus>
                </div>
                <div class="mb-4">
                    <label class="form-label text-muted small text-uppercase">Password</label>
                    <input type="password" name="password"
                           class="form-control bg-dark text-white border-secondary"
                           placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-success w-100 fw-bold py-2">
                    <i class="fa-solid fa-right-to-bracket me-2"></i> Login
                </button>
            </form>

            <hr class="border-secondary my-4">

            <p class="text-center text-muted small mb-0">
                Don't have an account?
                <a href="{{ url_for('register') }}" class="text-success fw-semibold">
                    Register here
                </a>
            </p>

        </div>
    </div>
</div>

{% endblock %}
